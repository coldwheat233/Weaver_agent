<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Weaver — 用户后台</title>
<style>
  :root {
    --bg: #F8F9FB;
    --glass: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.5);
    --text: #1A1A2E;
    --text2: #6E6E7C;
    --text3: #A0A0AC;
    --accent: #0891B2;
    --accent-light: #06B6D4;
    --accent-glass: rgba(8,145,178,0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
  }

  * { box-sizing:border-box;margin:0;padding:0; }

  body {
    background: var(--bg);
    /* 微妙渐变背景 */
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(8,145,178,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.03) 0%, transparent 60%);
    color: var(--text);
    font-family: "Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* 毛玻璃导航 */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 32px; height: 56px;
    display: flex; align-items: center; gap: 32px;
  }
  nav .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
  nav .tabs { display: flex; gap: 0; }
  nav .tab {
    padding: 16px 20px; font-size: 14px; font-weight: 500;
    color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
  }
  nav .tab:hover { color: var(--text); }
  nav .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  /* 统计卡片 */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--glass); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow);
  }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; letter-spacing: 0.5px; }

  /* 卡片列表 */
  .section-title { font-size: 16px; font-weight: 600; margin: 32px 0 16px; color: var(--text); }
  .card {
    background: var(--glass); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius); padding: 20px 24px;
    margin-bottom: 12px; box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { font-weight: 600; font-size: 15px; }
  .card-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .card-preview { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .scores { display: flex; gap: 16px; margin-top: 8px; }
  .mini-score { font-size: 12px; color: var(--accent); }
  .mini-score span { color: var(--text3); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Tag */
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    background: var(--accent-glass); color: var(--accent);
  }

  .hidden { display: none; }
</style>
</head>
<body>

<nav>
  <span class="logo">✦ Idea Weaver</span>
  <div class="tabs">
    <div class="tab active" data-tab="input">输入想法</div>
    <div class="tab" data-tab="output">编织成果</div>
    <div class="tab" data-tab="monitor">V3 监控</div>
  </div>
</nav>

<main>
  <!-- 统计 -->
  <div class="stats" id="stats"></div>

  <!-- Input Tab -->
  <div id="tab-input">
    <div class="section-title">最近想法</div>
    <div id="ideas-list"></div>
  </div>

  <!-- Output Tab -->
  <div id="tab-output" class="hidden">
    <div class="section-title">设计文档</div>
    <div id="designs-list"></div>
  </div>

  <!-- Monitor Tab (V3) -->
  <div id="tab-monitor" class="hidden">
    <div class="section-title">V3 · 自治演进</div>
    <div id="monitor-content"></div>
  </div>
</main>

<script>
const API = window.location.origin;

// Tab 切换
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('[id^="tab-"]').forEach(x => x.classList.add('hidden'));
    document.getElementById('tab-' + t.dataset.tab).classList.remove('hidden');
    if (t.dataset.tab === 'output') loadDesigns();
    if (t.dataset.tab === 'monitor') loadMonitor();
  });
});

// 加载统计
async function loadStats() {
  try {
    let ideas=0, sessions=0, designs=0, proposals=0;
    // 简化为从 API 获取
    const r = await fetch(API+'/api/health');
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-value" id="stat-ideas">-</div><div class="stat-label">想法</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-designs">-</div><div class="stat-label">设计</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-sessions">-</div><div class="stat-label">会话</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-v3">-</div><div class="stat-label">V3提案</div></div>`;
    // 尝试加载真实数据
    try {
      const ri = await fetch(API+'/api/ideas');
      if (ri.ok) {
        const ideas = await ri.json();
        document.getElementById('stat-ideas').textContent = ideas.length || 0;
      }
    } catch(e) {}
    try {
      const rp = await fetch(API+'/api/v3/proposals');
      if (rp.ok) {
        const p = await rp.json();
        document.getElementById('stat-v3').textContent = p.pending || 0;
      }
    } catch(e) {}
  } catch(e) {}
}

// 加载想法列表 (input tab)
async function loadIdeas() {
  const el = document.getElementById('ideas-list');
  try {
    const r = await fetch(API+'/api/ideas');
    if (!r.ok) throw new Error();
    const ideas = await r.json();
    if (!Array.isArray(ideas) || ideas.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">💭</div><div class="empty-text">还没有想法，按 Ctrl+Alt+I 开始捕捉</div></div>';
      return;
    }
    el.innerHTML = ideas.slice(0, 30).reverse().map(i => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${esc(i.standardized_content || i.raw_content || '').substring(0,80)}</span>
          <span class="tag">${i.source_type || 'text'}</span>
        </div>
        <div class="card-meta">${(i.intent_tags||[]).join(', ')} · ${(i.context_tags||[]).slice(0,3).join(', ')}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><div class="empty-text">无法加载想法</div></div>';
  }
}

// 加载设计列表 (output tab)
async function loadDesigns() {
  const el = document.getElementById('designs-list');
  try {
    const r = await fetch(API+'/api/designs');
    if (!r.ok) throw new Error();
    const designs = await r.json();
    if (!Array.isArray(designs) || designs.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📄</div><div class="empty-text">还没有编织结果，提交想法后触发编织</div></div>';
      return;
    }
    el.innerHTML = designs.slice(0, 20).reverse().map(d => `
      <div class="card" onclick="window.open('${API}/api/designs/${d.design_id}/html')">
        <div class="card-header">
          <span class="card-title">${esc(d.title||'未命名').substring(0,60)}</span>
          <span class="tag">v${d.version||1}</span>
        </div>
        <div class="scores">
          <div class="mini-score">创新度 <span>${(d.innovation_score||0).toFixed(2)}</span></div>
          <div class="mini-score">自洽性 <span>${(d.coherence_score||0).toFixed(2)}</span></div>
          <div class="mini-score">可行性 <span>${(d.feasibility_score||0).toFixed(2)}</span></div>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><div class="empty-text">无法加载设计</div></div>';
  }
}

// V3 监控
async function loadMonitor() {
  const el = document.getElementById('monitor-content');
  try {
    const r = await fetch(API+'/api/v3/proposals');
    if (!r.ok) throw new Error();
    const data = await r.json();
    const proposals = data.proposals || [];
    el.innerHTML = proposals.length === 0
      ? '<div class="empty"><div class="empty-icon">🔄</div><div class="empty-text">V3 自治演进就绪<br>概念簇达到临界质量时将自动推送设计提案</div></div>'
      : proposals.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${esc(p.cluster_name||'')}</span>
            <span class="tag">${p.status||''}</span>
          </div>
          <div class="card-meta">${p.node_count||0} 个想法 · ${p.cross_domains||0} 个领域</div>
          ${p.design_id ? `<div class="card-meta">设计: ${p.design_id}</div>` : ''}
        </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><div class="empty-text">监控加载失败</div></div>';
  }
}

function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadStats(); loadIdeas();
</script>
</body>
</html>
