name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # ── 检出代码 ──
      - uses: actions/checkout@v4

      # ── Python 后端 (PyInstaller sidecar) ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple/
          pip install pyinstaller -i https://mirrors.aliyun.com/pypi/simple/

      - name: Build backend sidecar
        run: pyinstaller backend.spec --clean --noconfirm

      # ── Node + Rust 前端 ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        working-directory: desktop
        run: npm install

      # ── 复制 sidecar 到 Tauri binaries ──
      - name: Copy sidecar binary
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp dist/weaver-backend.exe desktop/src-tauri/binaries/weaver-backend-x86_64-pc-windows-msvc.exe

      # ── Tauri build ──
      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      # ── 上传产物 ──
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: IdeaWeaver-Windows-MSI
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: IdeaWeaver-Windows-NSIS
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      # ── 创建 GitHub Release ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
